apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}"
  labels:
    {{- include "boilerplate.labels.standard" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: ldap
      port: 3890
      protocol: TCP
      targetPort: 3890
    - name: ldaps
      port: 6360
      protocol: TCP
      targetPort: 6360
    - name: http
      port: 17170
      protocol: TCP
      targetPort: 17170
  selector:
    app.kubernetes.io/name: "{{ .Release.Name }}"
