---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ .Release.Name }}-tls-redirect"
spec:
  parentRefs:
    - name: "{{ .Release.Name }}"
      sectionName: http
  hostnames:
    - "ldap.breeze-blocks.net"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: "{{ .Release.Name }}"
      sectionName: https
  hostnames:
    - "ldap.breeze-blocks.net"
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: "/"
      backendRefs:
        - name: {{ .Release.Name }}
          port: 17170
          weight: 1

